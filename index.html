<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVE Blackhole Ticket</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
<audio class="music" src="" autoplay></audio>
    <div class="ticket">
        <div class="ticket-top">
            <div class="header">
                <span>✦</span>
                <span class="header-title">PLAYLIST</span>
                <span>✦</span>
            </div>

            <div class="album-art">
                <img src="https://cdnimg.melon.co.kr/cm2/album/images/128/45/274/12845274_20260223113048_500.jpg?72cb1aa9aeb78dfbb6b09bdf93941b14/melon/resize/282/quality/80/optimize" alt="IVE REVIVE+">
                </div>

            <div class="song-info">
                <h2 class="artist">IVE</h2>
                <h1 class="song-title">BLACKHOLE</h1>
            </div>

            <div class="player-controls">
                <div class="progress-bar">
                    <div class="heart-marker">♥</div>
                </div>
                <div class="time-info">
                    <span>01:03</span>
                    <span>∞</span>
                </div>
                <div class="buttons">
                    <span class="icon">⇆</span>
                    <span class="icon-main">◁◁</span>
                    <span class="icon-play">▷</span>
                    <span class="icon-main">▷▷</span>
                    <span class="icon">↻</span>
                </div>
            </div>
        </div>

        <div class="divider">
            <div class="notch left"></div>
            <div class="dotted-line"></div>
            <div class="notch right"></div>
        </div>

        <div class="ticket-bottom">
            <div class="barcode">
                <div class="barcode-lines"></div>
                <div class="barcode-numbers">0012 7482901 2744103 0592346 8774510 7255</div>
            </div>
        </div>
    </div>

</body>
</html>
